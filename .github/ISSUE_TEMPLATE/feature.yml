name: Feature Request
description: Propose a new feature with BDD acceptance criteria
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## Feature Request
        Every feature must include `.feature` file content as acceptance criteria.
        Implementation is complete only when `rara-bdd run` passes all ACs.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What should be implemented and why?
    validations:
      required: true

  - type: textarea
    id: feature-file
    attributes:
      label: ".feature (Acceptance Criteria)"
      description: |
        Complete Gherkin scenarios with @AC-XX tags.
        This is the contract — implementation agent will use this to write tests.
      placeholder: |
        @module-name
        Feature: Feature title

          @AC-01
          Scenario: AC-01 Describe the expected behavior
            Given some precondition
            When some action is performed
            Then some verifiable result
      render: text
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Which modules, crates, or files are affected?
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional Context
      description: Any references, constraints, or design notes.
    validations:
      required: false
